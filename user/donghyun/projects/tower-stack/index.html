<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탑 쌓기 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,100,255,0.2);
    }
    #ui {
      margin-top: 14px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #score-display {
      font-size: 1.1rem;
      color: #aaa;
    }
    #score-display span {
      color: #facc15;
      font-weight: bold;
      font-size: 1.3rem;
    }
    #hint {
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="360" height="580"></canvas>
  <div id="ui">
    <div id="score-display">점수: <span id="score">0</span></div>
    <div id="hint">스페이스바 또는 클릭</div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const BLOCK_H = 22;
const BASE_WIDTH = 200;
const MOVING_Y = 90;       // 화면상 움직이는 블록의 고정 y 위치
const PERFECT_THRESH = 6;  // 이 픽셀 이내면 퍼펙트

// ── State ────────────────────────────────────────────────────────────────────
let blocks = [];      // { worldX, worldY, width, color }
let movingBlock = {}; // { worldX, worldY, width, speed, dir }
let falling = [];     // { worldX, worldY, width, color, vy }
let cameraY = 0;      // 카메라 오프셋 (worldY → screenY = worldY - cameraY)
let score = 0;
let phase = 'playing'; // playing | gameover
let perfectText = '';  // "PERFECT!" 표시
let perfectTimer = 0;
let bestScore = 0;

function blockColor(n) {
  const hue = (n * 37) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function toScreenY(worldY) { return worldY - cameraY; }

function initGame() {
  score = 0;
  cameraY = 0;
  falling = [];
  perfectText = '';
  perfectTimer = 0;
  phase = 'playing';
  scoreEl.textContent = '0';

  // 바닥 블록
  blocks = [{
    worldX: canvas.width / 2 - BASE_WIDTH / 2,
    worldY: 500,
    width: BASE_WIDTH,
    color: blockColor(0),
  }];

  spawnMoving();
}

function spawnMoving() {
  const top = blocks[blocks.length - 1];
  const speed = Math.min(1.8 + score * 0.12, 5.5);
  movingBlock = {
    worldX: Math.random() * (canvas.width - top.width - 8) + 4,
    worldY: top.worldY - BLOCK_H,
    width: top.width,
    dir: Math.random() < 0.5 ? 1 : -1,
    speed,
    color: blockColor(score + 1),
    // 불규칙 속도 변수
    speedMult: 1.0,
    targetMult: 1.0,
    multTimer: 800 + Math.random() * 600,
  };
  // 카메라: 움직이는 블록이 항상 MOVING_Y에 오게
  cameraY = movingBlock.worldY - MOVING_Y;
}

function dropBlock() {
  if (phase !== 'playing') { initGame(); return; }

  const top = blocks[blocks.length - 1];
  const mx = movingBlock.worldX;
  const mw = movingBlock.width;
  const tx = top.worldX;
  const tw = top.width;

  const overlapLeft  = Math.max(mx, tx);
  const overlapRight = Math.min(mx + mw, tx + tw);
  const overlapW = overlapRight - overlapLeft;

  if (overlapW <= 0) {
    // 완전히 빗나감
    falling.push({ worldX: mx, worldY: movingBlock.worldY, width: mw, color: movingBlock.color, vy: 0 });
    phase = 'gameover';
    if (score > bestScore) bestScore = score;
    return;
  }

  const isPerfect = Math.abs(mx - tx) < PERFECT_THRESH;

  if (isPerfect) {
    // 퍼펙트: 크기 그대로
    blocks.push({ worldX: tx, worldY: movingBlock.worldY, width: tw, color: movingBlock.color });
    perfectText = 'PERFECT!';
    perfectTimer = 900;
  } else {
    // 삐져나온 부분 낙하
    if (mx < tx) {
      falling.push({ worldX: mx, worldY: movingBlock.worldY, width: tx - mx, color: movingBlock.color, vy: 0 });
    } else {
      falling.push({ worldX: tx + tw, worldY: movingBlock.worldY, width: (mx + mw) - (tx + tw), color: movingBlock.color, vy: 0 });
    }
    blocks.push({ worldX: overlapLeft, worldY: movingBlock.worldY, width: overlapW, color: movingBlock.color });
  }

  score++;
  scoreEl.textContent = score;

  if (blocks[blocks.length - 1].width < 4) {
    phase = 'gameover';
    if (score > bestScore) bestScore = score;
    return;
  }

  spawnMoving();
}

// ── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (phase === 'playing') {
    // 불규칙 속도 패턴 업데이트
    movingBlock.multTimer -= dt;
    if (movingBlock.multTimer <= 0) {
      const r = Math.random();
      if (r < 0.20) {
        // 잠깐 멈춤
        movingBlock.targetMult = 0.05;
        movingBlock.multTimer = 250 + Math.random() * 300;
      } else if (r < 0.45) {
        // 갑자기 빠르게
        movingBlock.targetMult = 2.2 + Math.random() * 1.2;
        movingBlock.multTimer = 180 + Math.random() * 250;
      } else {
        // 평범한 속도
        movingBlock.targetMult = 0.6 + Math.random() * 0.8;
        movingBlock.multTimer = 600 + Math.random() * 900;
      }
    }
    // 목표 속도로 부드럽게 변화
    movingBlock.speedMult += (movingBlock.targetMult - movingBlock.speedMult) * dt * 0.007;

    movingBlock.worldX += movingBlock.dir * movingBlock.speed * movingBlock.speedMult * dt * 0.06;
    if (movingBlock.worldX + movingBlock.width >= canvas.width - 4) {
      movingBlock.worldX = canvas.width - 4 - movingBlock.width;
      movingBlock.dir = -1;
    }
    if (movingBlock.worldX <= 4) {
      movingBlock.worldX = 4;
      movingBlock.dir = 1;
    }
  }

  // 떨어지는 조각
  for (const f of falling) {
    f.vy = Math.min(f.vy + dt * 0.015, 8);
    f.worldY += f.vy;
  }
  falling = falling.filter(f => toScreenY(f.worldY) < canvas.height + 60);

  // 퍼펙트 텍스트 타이머
  if (perfectTimer > 0) perfectTimer -= dt;
  if (perfectTimer <= 0) perfectText = '';
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function drawBackground() {
  const depth = Math.min(score / 40, 1);
  const top = `hsl(230, ${40 - depth * 20}%, ${18 - depth * 10}%)`;
  const bot = `hsl(240, ${30 - depth * 15}%, ${12 - depth * 6}%)`;
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 멀리 있는 별처럼 보이는 점들
  ctx.fillStyle = `rgba(255,255,255,${0.15 + depth * 0.25})`;
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137 + score * 3) % canvas.width);
    const sy = ((i * 97) % canvas.height);
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
}

function drawBlock(worldX, worldY, width, color, alpha) {
  const sy = toScreenY(worldY);
  if (sy > canvas.height + 10 || sy + BLOCK_H < -10) return;

  ctx.save();
  ctx.globalAlpha = alpha ?? 1;

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(worldX + 3, sy + 4, width, BLOCK_H, 4);
  ctx.fill();

  // 블록 본체
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(worldX, sy, width, BLOCK_H, 4);
  ctx.fill();

  // 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(worldX + 4, sy + 3, width - 8, 5, 2);
  ctx.fill();

  ctx.restore();
}

function drawMoving() {
  if (phase !== 'playing') return;
  const { worldX, worldY, width, color } = movingBlock;

  // 위치 가이드 라인 (흐릿하게)
  const top = blocks[blocks.length - 1];
  const sy = toScreenY(worldY);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(top.worldX, sy + BLOCK_H / 2);
  ctx.lineTo(top.worldX + top.width, sy + BLOCK_H / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  drawBlock(worldX, worldY, width, color);

  // 블록 가장자리 강조 + 속도에 따라 테두리 색 변화
  const mult = movingBlock.speedMult ?? 1;
  const edgeAlpha = Math.min(0.3 + mult * 0.15, 0.9);
  const edgeColor = mult > 1.5 ? `rgba(255,100,100,${edgeAlpha})` : `rgba(255,255,255,${edgeAlpha})`;
  ctx.strokeStyle = edgeColor;
  ctx.lineWidth = mult > 1.5 ? 2.5 : 1.5;
  ctx.beginPath();
  ctx.roundRect(worldX, toScreenY(worldY), width, BLOCK_H, 4);
  ctx.stroke();
}

function drawPerfect() {
  if (!perfectText || perfectTimer <= 0) return;
  const alpha = Math.min(1, perfectTimer / 300);
  const rise = (900 - perfectTimer) * 0.04;
  const top = blocks[blocks.length - 1];
  const sy = toScreenY(top.worldY) - 10 - rise;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#facc15';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('PERFECT! ✨', canvas.width / 2, sy);
  ctx.restore();
}

function drawGameOver() {
  if (phase !== 'gameover') return;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px sans-serif';
  ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2 - 60);

  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#facc15';
  ctx.fillText(`점수: ${score}`, canvas.width / 2, canvas.height / 2 - 20);

  ctx.font = '15px sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`최고 기록: ${bestScore}`, canvas.width / 2, canvas.height / 2 + 14);

  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.roundRect(canvas.width / 2 - 70, canvas.height / 2 + 44, 140, 42, 10);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('다시 하기', canvas.width / 2, canvas.height / 2 + 71);
}

function drawScoreInCanvas() {
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '13px sans-serif';
  ctx.fillText(`최고: ${bestScore}`, 14, 24);
}

// ── Loop ─────────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(t) {
  const dt = Math.min(t - lastTime, 50);
  lastTime = t;

  update(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  for (const b of blocks) drawBlock(b.worldX, b.worldY, b.width, b.color);
  for (const f of falling) drawBlock(f.worldX, f.worldY, f.width, f.color, 0.7);
  drawMoving();
  drawPerfect();
  drawScoreInCanvas();
  drawGameOver();

  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); dropBlock(); }
});
canvas.addEventListener('click', () => dropBlock());

initGame();
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
